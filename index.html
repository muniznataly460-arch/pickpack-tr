<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pick&Pack TR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#F1EFEE;
  --surface:#FFFFFF;
  --ink:#231F1E;
  --ink-soft:#6B615F;
  --ink-faint:#9A908D;
  --line:#DEDAD8;
  --amber:#BE2A35;
  --amber-ink:#FFFFFF;
  --teal:#8A2028;
  --teal-dark:#6E1A20;
  --red:#BE2A35;
  --brand-gray:#D0CFCD;
  --st-nuevo:#9A908D;
  --st-surtiendo:#2F6FED;
  --st-surtido:#BE2A35;
  --st-empacando:#7C5CE0;
  --st-empacado:#8A2028;
  --st-enviado:#1E9E56;
  --radius:7px;
  --shadow:0 1px 2px rgba(20,25,22,.06), 0 4px 14px rgba(20,25,22,.05);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased;}
.mono{font-family:'IBM Plex Mono',monospace;}
.disp{font-family:'Montserrat',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
.tape{height:5px;background:repeating-linear-gradient(-45deg,var(--amber) 0 10px,var(--brand-gray) 10px 20px);opacity:.9;}
header{background:var(--ink);color:#fff;position:sticky;top:0;z-index:20;}
.header-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:12px 16px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-mark{width:34px;height:34px;border-radius:50%;background:var(--amber);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;color:#fff;letter-spacing:0;}
.logo-text{font-size:19px;font-weight:800;letter-spacing:.02em;font-family:'Montserrat',sans-serif;}
.logo-sub{font-size:9px;color:#C8CFC9;letter-spacing:.09em;margin-top:-1px;}
nav{display:flex;gap:2px;flex:1 1 auto;min-width:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;order:3;flex-basis:100%;}
nav::-webkit-scrollbar{display:none;}
.navbtn{position:relative;background:transparent;border:none;color:#C8CFC9;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:13.5px;font-weight:600;padding:9px 12px;border-radius:6px;cursor:pointer;transition:.15s;white-space:nowrap;flex-shrink:0;}
.navbtn:hover{background:rgba(255,255,255,.06);color:#fff;}
.navbtn.active{background:rgba(255,255,255,.1);color:#fff;}
.navbtn.active:after{content:'';position:absolute;left:14px;right:14px;bottom:-15px;height:3px;background:var(--amber);}
.badge-ping{position:absolute;top:5px;right:8px;background:var(--amber);color:var(--amber-ink);font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.userbox{display:flex;align-items:center;gap:8px;margin-left:auto;}
.userbox input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:6px;padding:7px 10px;font-size:13px;width:120px;}
.userbox input::placeholder{color:#9BA39D;}
.userbox label{font-size:10px;color:#9BA39D;text-transform:uppercase;letter-spacing:.08em;}

main{max-width:1180px;margin:0 auto;padding:22px 16px 80px;}
.page-title{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;gap:16px;flex-wrap:wrap;}
.page-title h1{font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.03em;font-size:26px;font-weight:700;margin:0;}
.page-title p{color:var(--ink-soft);font-size:13.5px;margin:4px 0 0;}
.btn{font-family:'Poppins';font-weight:600;font-size:13.5px;border-radius:6px;padding:10px 16px;border:1px solid transparent;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:7px;}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:#000;}
.btn-amber{background:var(--amber);color:var(--amber-ink);}
.btn-amber:hover{background:#e2940f;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink-soft);}
.btn-danger{background:#fff;border:1px solid var(--red);color:var(--red);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-sm{padding:6px 11px;font-size:12.5px;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;}
.section-label{font-family:'Montserrat';text-transform:uppercase;letter-spacing:.08em;font-size:12.5px;color:var(--ink-soft);font-weight:600;margin:0 0 10px;}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-family:'Montserrat';text-transform:uppercase;letter-spacing:.05em;font-size:11.5px;color:var(--ink-soft);font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);}
td{padding:11px 12px;border-bottom:1px solid #EEF0EE;font-size:13.5px;vertical-align:middle;}
tr.row-clickable{cursor:pointer;}
tr.row-clickable:hover td{background:#F7F9F7;}

.badge{display:inline-flex;align-items:center;gap:6px;font-family:'Montserrat';text-transform:uppercase;letter-spacing:.05em;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.b-nuevo{background:#EEEDEC;color:var(--st-nuevo);}
.b-surtiendo{background:#E8F0FE;color:var(--st-surtiendo);}
.b-surtido{background:#FBE4E0;color:var(--st-surtido);}
.b-empacando{background:#F1EDFC;color:var(--st-empacando);}
.b-empacado{background:#F3E2E0;color:var(--st-empacado);}
.b-enviado{background:#E5F6EB;color:var(--st-enviado);}
.b-mostrador{background:#FBE4E0;color:var(--red);}
.b-facturado{background:#E3E8FB;color:#3B4FBF;}
.badge-mostrador{display:inline-flex;align-items:center;gap:5px;background:var(--red);color:#fff;font-family:'Montserrat';text-transform:uppercase;letter-spacing:.05em;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;animation:pulseRed 1.6s ease-in-out infinite;}
.badge-local{display:inline-flex;align-items:center;gap:5px;background:#2F6FED;color:#fff;font-family:'Montserrat';text-transform:uppercase;letter-spacing:.05em;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(198,67,46,.5);}50%{box-shadow:0 0 0 5px rgba(198,67,46,.12);}}

.empty{padding:50px 20px;text-align:center;color:var(--ink-soft);}
.empty .em-icon{font-size:30px;margin-bottom:8px;}
.empty p{max-width:340px;margin:6px auto 0;font-size:13.5px;line-height:1.5;}

.modal-bg{position:fixed;inset:0;background:rgba(20,25,22,.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:50;}
.modal{background:#fff;border-radius:10px;width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);}
.modal-head h2{font-family:'Montserrat';text-transform:uppercase;font-size:20px;margin:0;letter-spacing:.03em;}
.modal-close{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;line-height:1;padding:4px;}
.modal-body{padding:22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:6px;font-size:14px;font-family:'Poppins';background:#fcfdfc;}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--teal);outline-offset:0;border-color:var(--teal);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.dropzone{border:2px dashed var(--line);border-radius:8px;padding:22px;text-align:center;color:var(--ink-soft);font-size:13.5px;cursor:pointer;transition:.15s;}
.dropzone:hover{border-color:var(--teal);background:#F5FAF9;}
.dropzone strong{color:var(--ink);}

.stepper{display:flex;align-items:center;padding:18px 10px 22px;}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.step .dot{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink-faint);z-index:2;}
.step.done .dot{border-color:var(--teal);background:var(--teal);color:#fff;}
.step.active .dot{border-color:var(--amber);background:var(--amber);color:var(--amber-ink);box-shadow:0 0 0 4px rgba(239,160,35,.25);}
.step .lbl{font-family:'Montserrat';text-transform:uppercase;font-size:11px;letter-spacing:.04em;margin-top:7px;color:var(--ink-soft);font-weight:600;text-align:center;}
.step.done .lbl,.step.active .lbl{color:var(--ink);}
.step .line{position:absolute;top:13px;left:calc(-50% + 13px);right:calc(50% + 13px);height:2.5px;background:var(--line);z-index:1;}
.step.done .line,.step.active .line{background:var(--teal);}
.step:first-child .line{display:none;}

.prod-table input[type=number]{width:80px;padding:6px 8px;border:1px solid var(--line);border-radius:5px;font-family:'IBM Plex Mono';}
.prod-table input[type=text]{padding:6px 8px;border:1px solid var(--line);border-radius:5px;width:100%;}
.chk{width:20px;height:20px;accent-color:var(--teal);cursor:pointer;}

.timeline{border-left:2px solid var(--line);margin-left:8px;padding-left:18px;}
.tl-item{position:relative;padding-bottom:16px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item:before{content:'';position:absolute;left:-23px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid #fff;box-shadow:0 0 0 1.5px var(--teal);}
.tl-when{font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono';}
.tl-evt{font-size:13.5px;font-weight:600;margin:1px 0 1px;}
.tl-user{font-size:12px;color:var(--ink-soft);}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:8px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:100;display:flex;align-items:center;gap:10px;}
.toast .dot-amber{width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;}

.foot-note{text-align:center;margin-top:40px;color:var(--ink-faint);font-size:12px;}
.foot-note button{background:none;border:none;color:var(--red);text-decoration:underline;cursor:pointer;font-size:12px;}

.resumen-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.resumen-chip{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:6px 14px;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow);}
.rc-n{font-family:'Montserrat';font-weight:700;font-size:15px;background:var(--ink);color:#fff;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
.rc-lbl{font-family:'Montserrat';text-transform:uppercase;letter-spacing:.04em;font-size:12px;color:var(--ink-soft);font-weight:600;}

.pantalla-list{display:flex;flex-direction:column;gap:8px;}
.pantalla-row{background:var(--surface);border:1px solid var(--line);border-left:5px solid var(--ink-faint);border-radius:6px;padding:11px 16px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
.pantalla-row:hover{border-color:var(--teal);border-left-color:var(--teal);}
.pr-main{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.pr-folio{font-family:'IBM Plex Mono';font-weight:700;font-size:14px;min-width:80px;}
.pr-cliente{flex:1;min-width:160px;font-size:13.5px;color:var(--ink);}
.pr-meta{font-size:11.5px;color:var(--ink-faint);white-space:nowrap;}
.pr-alerta{margin-top:8px;font-size:12.5px;color:var(--red);font-weight:600;background:#FBE4E0;border-radius:5px;padding:6px 10px;}
.pantalla-row.alerta{border-left-color:var(--red);background:#FFFBFA;}
.pantalla-row.mostrador-row{border-left-color:var(--red);}
.pantalla-row.local-row{border-left-color:#2F6FED;}
@keyframes flashGlow{0%,100%{box-shadow:0 0 0 0 rgba(239,160,35,.55);border-left-color:var(--amber);}50%{box-shadow:0 0 0 5px rgba(239,160,35,.12);border-left-color:var(--amber);}}
.flash-new{animation:flashGlow 1.3s ease-in-out infinite;}

.detail-header{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 22px 0;flex-wrap:wrap;gap:10px;}
.detail-header h2{font-family:'Montserrat';font-size:24px;text-transform:uppercase;margin:0 0 4px;}
.detail-header .meta{color:var(--ink-soft);font-size:13px;}
.panel-actions{padding:16px 22px 22px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--line);margin-top:18px;flex-wrap:wrap;}
.search-input{padding:9px 12px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;width:240px;}
.two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:22px;padding:0 22px 22px;}
@media(max-width:820px){
  .two-col{grid-template-columns:1fr;}
  .row2{grid-template-columns:1fr;}
}
@media(max-width:680px){
  .header-inner{gap:8px;padding:10px 12px;}
  .logo-sub{display:none;}
  .logo-text{font-size:16px;}
  .logo-mark{width:28px;height:28px;font-size:12px;}
  .userbox{margin-left:0;}
  .userbox input{width:96px;font-size:12px;}
  #btnSound{font-size:11px;padding:6px 9px;}
  .navbtn{font-size:12.5px;padding:8px 10px;}
  main{padding:16px 10px 70px;}
  .page-title h1{font-size:21px;}
  .page-title p{font-size:12.5px;}
  .btn{font-size:13px;padding:9px 13px;}
  table{font-size:12px;}
  th,td{padding:8px 7px;}
  .modal{max-width:96vw;}
  .modal-body{padding:14px;}
  .modal-head{padding:14px 16px;}
  .stepper{padding:14px 2px 18px;}
  .step .lbl{font-size:9px;letter-spacing:.02em;}
  .step .dot{width:22px;height:22px;font-size:10.5px;}
  .detail-header{padding:16px 14px 0;}
  .two-col{padding:0 14px 14px;}
  .panel-actions{padding:14px;}
  .tiempos-strip,.resumen-chips{padding:0 14px 12px;}
  .pantalla-row{padding:10px 12px;}
  .pr-folio{min-width:64px;font-size:12.5px;}
  .search-input{width:100%;}
  .page-title{flex-direction:column;align-items:stretch;}
  .page-title>.btn,.page-title>div>.btn{width:100%;justify-content:center;}
}
@media(max-width:420px){
  .navbtn{font-size:11.5px;padding:7px 8px;}
  .logo-text{font-size:14px;}
  .badge{font-size:10px;padding:3px 8px;}
}
.loading-screen{display:flex;align-items:center;justify-content:center;height:70vh;color:var(--ink-soft);font-family:'Montserrat';text-transform:uppercase;letter-spacing:.06em;}
.local-warning{background:#FDF2E0;color:#7A5510;border-bottom:1px solid #E8B84B;font-size:12.5px;text-align:center;padding:8px 16px;}

.tiempos-strip{display:flex;flex-wrap:wrap;gap:10px;padding:0 22px 16px;}
.tiempo-chip{background:#F7F9F7;border:1px solid var(--line);border-radius:6px;padding:6px 12px;display:flex;flex-direction:column;gap:1px;}
.tc-lbl{font-family:'Montserrat';text-transform:uppercase;letter-spacing:.05em;font-size:10.5px;color:var(--ink-soft);font-weight:600;}
.tc-val{font-size:13px;font-weight:600;}
</style>

<header>
  <div class="tape"></div>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">TR</div>
      <div>
        <div class="logo-text">Pick&amp;Pack <span style="color:var(--amber);">TR</span></div>
        <div class="logo-sub">SURTIDO &middot; EMPAQUE &middot; ENVÍO</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <button class="btn btn-ghost btn-sm" id="btnSound" style="border-color:rgba(255,255,255,.3);color:#fff;">🔔 Sonido: ON</button>
    <div class="userbox">
      <div>
        <label>Operador</label>
        <input id="userNameInput" type="text" placeholder="Tu nombre" maxlength="30">
      </div>
    </div>
  </div>
</header>

<div id="localWarning"></div>
<main id="main"><div class="loading-screen">Cargando pedidos&hellip;</div></main>

<script>
/* =========================================================
   Pick&Pack TR — Prototipo de surtido, empaque y envío
   Almacenamiento: window.storage (compartido entre todos los
   que abran este artifact, para simular multiusuario).
   ========================================================= */

// ---------- RESPALDO DE ALMACENAMIENTO (fuera de Claude) ----------
// window.storage solo existe dentro del entorno de Claude. Si esta página se abre
// como sitio web normal (GitHub Pages, servidor propio, etc.), esta capa simula la
// misma API usando localStorage — con la diferencia de que los datos quedan
// guardados solo en ESTE navegador/dispositivo, no compartidos entre usuarios.
// Para compartir datos en tiempo real entre varias personas fuera de Claude se
// necesita un backend real (Firebase, Supabase, Odoo, etc.).
// =========================================================
// CONFIGURACIÓN DE FIREBASE (solo necesaria si esta página se abre
// fuera de Claude, ej. en GitHub Pages, y quieres que varias personas
// compartan los mismos datos en tiempo real).
//
// Cómo obtener estos datos: ve a https://console.firebase.google.com,
// crea un proyecto gratis, agrega una "app web", y copia el objeto de
// configuración que te da ahí. Pégalo reemplazando los valores de abajo.
// Si los dejas tal cual (con "PEGA_AQUI..."), la app sigue funcionando
// normal, solo que sin compartir datos fuera de Claude.
// =========================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCrieKxviTIlaIiDLVcrCg7klGa96zUhMQ",
  authDomain: "pickpack-tr.firebaseapp.com",
  projectId: "pickpack-tr",
  storageBucket: "pickpack-tr.firebasestorage.app",
  messagingSenderId: "702696906806",
  appId: "1:702696906806:web:84c649b2e15dc432cb3897"
};

let usandoAlmacenamientoLocal = false;
let usandoFirebase = false;

// Decide qué sistema de almacenamiento usar, en este orden de prioridad:
// 1) window.storage de Claude (si se abre dentro de Claude — no se toca nada).
// 2) Firebase (si se configuró arriba y esta página corre fuera de Claude).
// 3) localStorage del navegador (último respaldo, solo local a ese dispositivo).
async function setupStorage(){
  if(typeof window.storage !== 'undefined'){
    return; // ya estamos dentro de Claude, se usa tal cual
  }
  const cfgListo = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes('PEGA_AQUI');
  if(cfgListo && typeof firebase !== 'undefined'){
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      const db = firebase.firestore();
      const col = db.collection('pickpack_storage');
      window.storage = {
        async get(key){
          const doc = await col.doc(key).get();
          if(!doc.exists) throw new Error('key not found: '+key);
          return {key, value: doc.data().value, shared:true};
        },
        async set(key, value){
          await col.doc(key).set({value, actualizado: Date.now()});
          return {key, value, shared:true};
        },
        async delete(key){
          await col.doc(key).delete();
          return {key, deleted:true, shared:true};
        },
        async list(prefix){
          const snap = await col.get();
          const keys = snap.docs.map(d=>d.id).filter(k=>!prefix || k.startsWith(prefix));
          return {keys, prefix, shared:true};
        }
      };
      usandoFirebase = true;
      return;
    }catch(e){
      console.error('[Pick&Pack TR] No se pudo conectar a Firebase, usando localStorage:', e);
    }
  }
  usandoAlmacenamientoLocal = true;
  console.warn('[Pick&Pack TR] Sin Claude ni Firebase configurado: usando localStorage (datos solo locales a este navegador).');
  window.storage = {
    async get(key){
      const raw = localStorage.getItem('pp_'+key);
      if(raw===null) throw new Error('key not found: '+key);
      return {key, value:raw, shared:false};
    },
    async set(key, value){
      localStorage.setItem('pp_'+key, value);
      return {key, value, shared:false};
    },
    async delete(key){
      localStorage.removeItem('pp_'+key);
      return {key, deleted:true, shared:false};
    },
    async list(prefix){
      const pre = 'pp_'+(prefix||'');

// Busca si el texto detectado en el PDF coincide con algún cliente ya registrado
// (exacto, o que uno contenga al otro — útil cuando se coló texto extra al detectar).
function buscarClienteParecido(nombreDetectado){
  if(!nombreDetectado) return null;
  const norm = s => s.toLowerCase().replace(/\s+/g,' ').trim();
  const nd = norm(nombreDetectado);
  let match = clientes.find(c => norm(c) === nd);
  if(match) return match;
  match = clientes.find(c => { const nc = norm(c); return nc.length>3 && (nd.includes(nc) || nc.includes(nd)); });
  return match || null;
}

// ---------- BLOQUEO SIMPLE POR PEDIDO ----------
// Evita que dos personas editen el mismo pedido al mismo tiempo y se pisen los cambios.
function lockIsFresh(p){
  return !!(p && p.locked_by_session && p.locked_at && (Date.now() - new Date(p.locked_at).getTime()) < LOCK_TTL_MS);
}
function isLockedByOther(p){
  return lockIsFresh(p) && p.locked_by_session !== mySessionId;
}
function iHoldLock(p){
  return lockIsFresh(p) && p.locked_by_session === mySessionId;
}
function lockElapsedTxt(p){
  const s = Math.max(0, Math.floor((Date.now() - new Date(p.locked_at).getTime())/1000));
  if(s<60) return 'hace '+s+' seg';
  return 'hace '+Math.floor(s/60)+' min';
}
async function acquireLock(p){
  p.locked_by = userName || 'Sin nombre';
  p.locked_by_session = mySessionId;
  p.locked_at = new Date().toISOString();
  await savePedidos();
  clearInterval(lockHeartbeatTimer);
  lockHeartbeatTimer = setInterval(async ()=>{
    if(document.hidden){
      return; // pestaña en segundo plano: no renovar, que expire solo si de verdad se quedó ahí
    }
    if(currentPedidoId===p.id && iHoldLock(p)){
      p.locked_at = new Date().toISOString();
      await savePedidos();
    } else {
      clearInterval(lockHeartbeatTimer);
    }
  }, LOCK_HEARTBEAT_MS);
}
async function releaseLock(p){
  clearInterval(lockHeartbeatTimer);
  if(p && iHoldLock(p)){
    p.locked_by = null; p.locked_by_session = null; p.locked_at = null;
    await savePedidos();
  }
}

}

function fmtFecha(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) + ' · ' + d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}
function fmtHora(iso){
  return new Date(iso).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}
function fmtFechaHoraExcel(iso){
  if(!iso) return '';
  return new Date(iso).toLocaleString('es-MX');
}
function diffMin(startIso, endIso){
  if(!startIso || !endIso) return '';
  return Math.max(0, Math.round((new Date(endIso) - new Date(startIso))/60000));
}

// Busca en la bitácora la primera vez que ocurrió cada evento clave, para poder mostrar

function faltantesHistorial(p){

}
function renderAvisoFaltantes(p){

    ${eventos.map(e=>`<p style="font-size:12px;color:#7A5510;margin:2px 0;">${fmtFecha(e.fecha)} — ${escapeHtml(e.detalle||'')}</p>`).join('')}
  </div>`;
}

function getStageTimes(p){
  const find = (evt)=> (p.historial.find(h=>h.evento===evt) || {}).fecha || null;
  return {
    creado: p.fecha_creacion,
    surtido_inicio: find('Surtido iniciado') || (p.estado!=='nuevo' ? p.fecha_creacion : null),
    surtido_fin: find('Surtido confirmado'),
    empaque_inicio: find('Empaque iniciado'),
    empaque_fin: find('Empaque confirmado'),
    enviado: p.tipo_pedido==='Mostrador' ? find('Surtido confirmado') : find('Enviado al cliente'),
    facturado: find('Factura registrada'),
  };
}

function exportarExcel(){
  if(typeof XLSX === 'undefined'){ showToast('No se pudo cargar el módulo de Excel. Revisa tu conexión.'); return; }
  const pedidosRows = pedidos.map(p=>{
    const t = getStageTimes(p);

      'Responsable Almacén': p.responsable_almacen || '',
      'Responsable Empaque': p.responsable_empaque || '',
      'Responsable Embarques': p.responsable_embarques || '',
      'Estado actual': ESTADO_BADGE_TXT[p.estado],
      '# Productos': p.productos.length,
      'Cotización cargada': fmtFechaHoraExcel(t.creado),
      'Surtido — inicio': fmtFechaHoraExcel(t.surtido_inicio),
      'Surtido — fin': fmtFechaHoraExcel(t.surtido_fin),
      'Tiempo surtido (min)': diffMin(t.surtido_inicio, t.surtido_fin),
      'Empaque — inicio': fmtFechaHoraExcel(t.empaque_inicio),
      'Empaque — fin': fmtFechaHoraExcel(t.empaque_fin),
      'Tiempo empaque (min)': diffMin(t.empaque_inicio, t.empaque_fin),
      'Enviado al cliente': fmtFechaHoraExcel(t.enviado),
      'Facturado': fmtFechaHoraExcel(t.facturado),
      'Tiempo total (min)': diffMin(t.creado, t.facturado || t.enviado),
      'Paquetería': p.envio.paqueteria || '',
      'Guía': p.envio.guia || '',
      'Costo de envío': p.envio.costo_envio || 0,
      'N° Factura': (p.factura && p.factura.numero) || '',
      'Tuvo faltante durante el proceso': faltantesHistorial(p).length ? 'Sí' : 'No',
    };
  });

  const productosRows = [];
  pedidos.forEach(p=>{
    p.productos.forEach(pr=>{
      productosRows.push({
        'Folio': p.folio, 'Cliente': p.cliente, 'SKU': pr.sku || '',
        'Producto': pr.nombre, 'Cant. solicitada': pr.cantidad_solicitada,
        'Cant. surtida': pr.cantidad_surtida || 0, 'Surtido': pr.surtido ? 'Sí' : 'No',
        'Cant. empacada': (pr.cantidad_empacada!==undefined && pr.cantidad_empacada!==null) ? pr.cantidad_empacada : '',

      });
    });
  });

  const historialRows = [];
  pedidos.forEach(p=>{
    p.historial.forEach(h=>{
      historialRows.push({
        'Folio': p.folio, 'Cliente': p.cliente, 'Fecha y hora': fmtFechaHoraExcel(h.fecha),
        'Evento': h.evento, 'Usuario': h.usuario, 'Detalle': h.detalle || '',
      });
    });
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pedidosRows), 'Pedidos');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(productosRows), 'Productos');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(historialRows), 'Historial');
  const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
  XLSX.writeFile(wb, 'pickpack-tr-reporte-'+stamp+'.xlsx');
  showToast('Excel generado: revisa tus descargas.');
}

let toastTimer=null;
function showToast(msg){
  let t = document.getElementById('toastEl');
  if(t) t.remove();
  t = document.createElement('div');
  t.id='toastEl';
  t.className='toast';
  t.innerHTML = '<span class="dot-amber"></span><span>'+escapeHtml(msg)+'</span>';
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.remove(), 3200);
}

function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

  nav.innerHTML = NAV_ITEMS.map(item=>{
    const badge = counts[item.id] ? '<span class="badge-ping">'+counts[item.id]+'</span>' : '';

      currentTab=b.dataset.tab; currentPedidoId=null; render();
    };
  });

function render(){
  renderNav();
  const main = document.getElementById('main');
  if(!loaded){ main.innerHTML = '<div class="loading-screen">Cargando pedidos&hellip;</div>'; return; }

  if(currentPedidoId){
    const p = pedidos.find(x=>x.id===currentPedidoId);
    if(!p){ currentPedidoId=null; }
    else { main.innerHTML = renderDetail(p); attachDetailHandlers(p); return; }
  }

  if(currentTab==='captura') { main.innerHTML = renderCaptura(); attachCapturaHandlers(); }
  else if(currentTab==='almacen') { main.innerHTML = renderLista('almacen'); attachListaHandlers('almacen'); }
  else if(currentTab==='pantalla') { main.innerHTML = renderPantalla(); attachPantallaHandlers(); }
  else if(currentTab==='embarques') { main.innerHTML = renderLista('embarques'); attachListaHandlers('embarques'); }
  else if(currentTab==='facturacion') { main.innerHTML = renderLista('facturacion'); attachListaHandlers('facturacion'); }
  else if(currentTab==='historial') { main.innerHTML = renderHistorial(); attachHistorialHandlers(); }
}

function badgeHtml(estado){

  if(p.tipo_pedido==='Mostrador') return '<span class="badge-mostrador">⚡ MOSTRADOR</span>';
  if(p.tipo_pedido==='Local') return '<span class="badge-local">📍 LOCAL</span>';

}
function prioridadScore(p){
  if(p.tipo_pedido==='Mostrador') return 2;
  if(p.tipo_pedido==='Local') return 1;
  return 0;
}
// Mostrador y Local suben primero en las listas de trabajo, sin importar cuándo se
// crearon — Mostrador tiene la prioridad más alta, Local justo debajo.
function ordenPrioridad(a,b){
  const sa = prioridadScore(a), sb = prioridadScore(b);
  if(sb!==sa) return sb-sa;
  return a.fecha_creacion.localeCompare(b.fecha_creacion);
}
function ordenPrioridadBoard(a,b){
  const sa = prioridadScore(a), sb = prioridadScore(b);
  if(sb!==sa) return sb-sa;
  return lastEventTime(b)-lastEventTime(a);
}

  document.getElementById('btnImportarClientes').onclick = ()=>{

    if(mostrar) ta.focus();

  document.getElementById('btnGuardarImportClientes').onclick = async ()=>{

    const nombres = texto.split('\n').map(l=>l.trim()).filter(Boolean);
    if(nombres.length===0){ showToast('Pega al menos un nombre, uno por línea.'); return; }

    nombres.forEach(n=>{
      if(!clientes.some(c=>c.toLowerCase()===n.toLowerCase())){ clientes.push(n); agregados++; }
    });
    await saveClientes();
    const sel = document.getElementById('mCliente');
    const valorActual = sel.value;
    sel.innerHTML = '<option value="">Selecciona un cliente&hellip;</option>' +
      clientes.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('') +
      '<option value="__new__">+ Agregar nuevo cliente&hellip;</option>';
    sel.value = valorActual;
    document.getElementById('taImportarClientes').value = '';
    document.getElementById('taImportarClientes').style.display = 'none';
    document.getElementById('btnGuardarImportClientes').style.display = 'none';
    showToast(agregados+' cliente(s) agregado(s) a la lista.');
  };
  document.getElementById('dropzone').onclick = ()=>document.getElementById('pdfInput').click();
  document.getElementById('pdfInput').onchange = handlePdfUpload;
  document.getElementById('btnAddRow').onclick = ()=>{ modalProductos.push({sku:'',nombre:'',cantidad_solicitada:1}); renderProdTable(); };
  document.getElementById('mCrear').onclick = crearPedidoDesdeModal;
  renderProdTable();

  // drag & drop
  const dz = document.getElementById('dropzone');
  dz.ondragover = (e)=>{ e.preventDefault(); dz.style.borderColor='var(--teal)'; };
  dz.ondragleave = ()=>{ dz.style.borderColor='var(--line)'; };
  dz.ondrop = (e)=>{
    e.preventDefault(); dz.style.borderColor='var(--line)';
    if(e.dataTransfer.files.length){ processPdfFile(e.dataTransfer.files[0]); }
  };
}
