async function handlePdfUpload(e){
  const file = e.target.files[0];
  if(file) await processPdfFile(file);
}

// Lector principal: busca directamente el patrón [código] en el texto reconstruido del
// PDF (como usa Odoo para el SKU dentro de la descripción) y toma el primer número que
// aparezca después como la cantidad. No depende de que los títulos de columna coincidan
// exactamente, así que es más tolerante a variaciones de plantilla.
function extractProductsByBracket(lines){
  const productos = [];
  let current = null;
  for(const rawLine of lines){
    const line = rawLine.trim();
    if(!line) continue;
    const low = line.toLowerCase();
    if(/^subtotal\b/.test(low) || /^iva\b/.test(low) || /^total\b/.test(low) || /^impuestos totales/.test(low)){
      break; // ya terminó la tabla de productos
    }
    const bracketMatch = line.match(/\[([^\]]+)\]/);
    if(bracketMatch){
      if(current) productos.push(current);
      let parts = line.split('\t');
      if(parts.length<2) parts = line.split(/\s{2,}/);
      const descripcion = parts[0].replace(/\[[^\]]+\]\s*/, '').trim();
      let cantidad = null;
      for(let i=1;i<parts.length;i++){
        const tok = parts[i].trim().replace(/,/g,'');
        const m = tok.match(/^(\d+(\.\d+)?)/);
        if(m){ cantidad = parseFloat(m[1]); break; }
      }
      if(cantidad===null){
        const rest = line.slice(line.indexOf(bracketMatch[0]) + bracketMatch[0].length);
        const m2 = rest.match(/(\d{1,3}(?:,\d{3})*\.\d+)/); // requiere punto decimal para no confundir con años (ej. "2011")
        if(m2) cantidad = parseFloat(m2[1].replace(/,/g,''));
      }
      current = { sku: bracketMatch[1], nombre: descripcion, cantidad_solicitada: cantidad || 1 };
    } else if(current){
      if(!/^\d+([.,]\d+)?\s*(pieza|piezas|pza|kg|unidad|unidades|u)?$/i.test(line)){
        current.nombre = (current.nombre + ' ' + line).trim();
      }
    }
  }
  if(current) productos.push(current);
  return productos.filter(p=>p.nombre && p.cantidad_solicitada>0);
}

// Detecta cliente, asesor (vendedor) y número de cotización en el texto reconstruido
// del PDF, para autocompletar esos campos del formulario de nuevo pedido.
function extractCotizacionMeta(lines, items){
  items = items || [];
  let numeroCotizacion = null, asesor = null, cliente = null, idxCot = -1;

  for(let i=0;i<lines.length;i++){
    const m = lines[i].match(/n[uú]mero de (?:cotizaci[oó]n|orden|pedido|venta)\s*[:\-]?\s*([A-Za-z0-9\-\/]+)/i);
    if(m){ numeroCotizacion = m[1]; idxCot = i; break; }
  }

  for(let i=0;i<lines.length;i++){
    const parts = lines[i].split('\t');
    const vIdx = parts.findIndex(seg=>/vendedor/i.test(seg));
    if(vIdx!==-1){
      const sameCell = parts[vIdx].replace(/.*vendedor\s*:?/i,'').trim();
      if(sameCell){ asesor = sameCell; }
      else if(lines[i+1]){
        const nextParts = lines[i+1].split('\t');
        if(nextParts[vIdx]) asesor = nextParts[vIdx].trim();
      }
      break;
    }
  }

  // El cliente es el bloque de nombre/dirección alineado con la línea "RFC:" (misma
  // posición horizontal), que siempre está a la derecha del remitente (nuestra propia
  // empresa, alineada más a la izquierda). Usar la posición evita confundirse sin
  // importar cuántas líneas tenga la dirección o si alguna no trae números.
  const rfcItem = items.find(it=>/rfc\s*:?/i.test(it.str));
  if(rfcItem){
    const bloque = items.filter(it=>
      Math.abs(it.x - rfcItem.x) < 90 &&
      it.y >= rfcItem.y &&
      it.y - rfcItem.y < 220
    );
    if(bloque.length){
      const rows = {};
      bloque.forEach(it=>{
        let key = Object.keys(rows).map(Number).find(k=>Math.abs(k-it.y)<=3);
        if(key===undefined) key = it.y;
        (rows[key] = rows[key]||[]).push(it);
      });
      const ys = Object.keys(rows).map(Number).sort((a,b)=>b-a); // de arriba hacia abajo
      if(ys.length){
        const topRow = rows[ys[0]].sort((a,b)=>a.x-b.x);
        const posibleNombre = topRow.map(it=>it.str).join(' ').trim();
        if(posibleNombre && !/^rfc\s*:?/i.test(posibleNombre)){
          // quitar números sueltos que se hayan colado al final (ej. cantidades/precios)
          cliente = posibleNombre.replace(/(\s+\d[\d.,]*)+\s*$/,'').trim();
        }
      }
    }
  }

  // Respaldo si el PDF no trae RFC (ej. cliente sin RUC/RFC registrado): usar el
  // patrón de nombre-sin-dígitos seguido de una línea con dígitos.
  if(!cliente && idxCot>0){
    const PALABRAS_NO_NOMBRE = /^(m[eé]xico|usa|estados unidos|canad[aá])$/i;
    for(let i=0;i<idxCot;i++){
      const l = (lines[i]||'').trim();
      const next = (lines[i+1]||'').trim();
      if(l && l.length>4 && !/\d/.test(l) && !PALABRAS_NO_NOMBRE.test(l) && next && /\d/.test(next)){
        cliente = l;
      }
    }
  }

  // Términos de pago: si el PDF lo menciona y dice "contado", es Contado; si dice
  // cualquier otra cosa (30 días, crédito, etc.) es Crédito; si no aparece, Contado.
  let terminosPago = 'Contado';
  for(let i=0;i<lines.length;i++){
    const parts = lines[i].split('\t');
    const tIdx = parts.findIndex(seg=>/t[eé]rminos de pago/i.test(seg));
    if(tIdx!==-1){
      let valor = parts[tIdx].replace(/.*t[eé]rminos de pago\s*:?/i,'').trim();
      if(!valor && lines[i+1]){
        const nextParts = lines[i+1].split('\t');
        valor = (nextParts[tIdx]||nextParts[0]||'').trim();
      }
      terminosPago = (valor && !/contado/i.test(valor)) ? 'Crédito' : 'Contado';
      break;
    }
  }

  return {cliente, asesor, numeroCotizacion, terminosPago};
}

async function processPdfFile(file){
  const dzText = document.getElementById('dzText');
  dzText.innerHTML = 'Leyendo <strong>'+escapeHtml(file.name)+'</strong>&hellip;';
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let allColProducts = [];
    let allLines = [];
    let allRawItems = [];
    for(let pnum=1; pnum<=pdf.numPages; pnum++){
      const page = await pdf.getPage(pnum);
      const content = await page.getTextContent();
      const items = content.items.map(it=>({str:it.str, x:it.transform[4], y:Math.round(it.transform[5])}));
      allColProducts = allColProducts.concat(extractProductsColumnBased(items));
      allLines = allLines.concat(buildLinesFromItems(items));
      allRawItems = allRawItems.concat(items);
    }
    const byBracket = extractProductsByBracket(allLines);
    const extracted = byBracket.length ? byBracket : (allColProducts.length ? allColProducts : parseLinesToProducts(allLines));

    const meta = extractCotizacionMeta(allLines, allRawItems);
    let notasMeta = [];
    if(meta.cliente){
      const selCliente = document.getElementById('mCliente');
      const parecido = buscarClienteParecido(meta.cliente);
      if(parecido){
        selCliente.value = parecido;
        notasMeta.push('cliente (coincide con "'+parecido+'")');
      } else {
        selCliente.value = '__new__';
        const nuevoInput = document.getElementById('mClienteNuevo');
        nuevoInput.style.display = 'block';
        nuevoInput.value = meta.cliente;
        notasMeta.push('cliente detectado — revísalo antes de guardar');
      }
    }
    if(meta.numeroCotizacion){ document.getElementById('mFolio').value = meta.numeroCotizacion; notasMeta.push('folio'); }
    if(meta.asesor){
      const selAsesor = document.getElementById('mAsesor');
      const yaExiste = asesores.some(a=>a.toLowerCase()===meta.asesor.toLowerCase());
      if(!yaExiste){ asesores.push(meta.asesor); await saveAsesores(); }
      const opt = Array.from(selAsesor.options).find(o=>o.value.toLowerCase()===meta.asesor.toLowerCase());
      if(opt){ selAsesor.value = opt.value; } else { selAsesor.innerHTML += `<option value="${escapeHtml(meta.asesor)}">${escapeHtml(meta.asesor)}</option>`; selAsesor.value = meta.asesor; }
      notasMeta.push('asesor');
    }
    if(meta.terminosPago){
      document.getElementById('mTerminosPago').value = meta.terminosPago;
      notasMeta.push('términos de pago: '+meta.terminosPago);
    }

    if(extracted.length){
      modalProductos = modalProductos.concat(extracted);
      dzText.innerHTML = '✅ <strong>'+escapeHtml(file.name)+'</strong> — se detectaron '+extracted.length+' producto(s)'+(notasMeta.length?' y se autocompletó '+notasMeta.join(', '):'')+'. Revísalos abajo antes de crear el pedido.';
    } else {
      dzText.innerHTML = '⚠️ No se detectaron filas de productos automáticamente en <strong>'+escapeHtml(file.name)+'</strong>. Agrega los productos manualmente abajo.';
    }
    renderProdTable();
  }catch(err){
    console.error(err);
    dzText.innerHTML = '⚠️ No se pudo leer el PDF. Agrega los productos manualmente abajo.';
  }
}

// Reconstruye líneas de texto agrupando por posición Y (usado como respaldo si no se
// reconoce el formato de columnas de la cotización).
function buildLinesFromItems(items){
  const rows = {};
  items.forEach(it=>{
    let key = Object.keys(rows).map(Number).find(k=>Math.abs(k-it.y)<=3);
    if(key===undefined) key = it.y;
    (rows[key] = rows[key]||[]).push(it);
  });
  const ys = Object.keys(rows).map(Number).sort((a,b)=>b-a);
  const lines = [];
  ys.forEach(y=>{
    const rowItems = rows[y].sort((a,b)=>a.x-b.x);
    let line=''; let lastEnd=null;
    rowItems.forEach(it=>{
      if(lastEnd!==null){
        const gap = it.x - lastEnd;
        line += gap>14 ? '\t' : (gap>2?' ':'');
      }
      line += it.str;
      lastEnd = it.x + it.str.length*4.3;
    });
    if(line.trim()) lines.push(line.trim());
  });
  return lines;
}

// Lector orientado a cotizaciones de Odoo: detecta las columnas reales de la tabla
// (Descripción / Cantidad / Precio unitario / Impuestos / Importe) usando su posición
// horizontal, para separar correctamente el código (entre corchetes), el nombre del
// producto y la cantidad — sin importar que la descripción ocupe varias líneas.
function extractProductsColumnBased(items){
  const norm = s => (s||'').trim().toLowerCase();
  let headerY = null;
  const colDefsRaw = [];
  items.forEach(it=>{
    const t = norm(it.str);
    if(t==='descripción' || t==='descripcion' || t==='producto'){ colDefsRaw.push({name:'descripcion', x:it.x}); headerY = it.y; }
    else if(t==='cantidad' || t==='cant.') colDefsRaw.push({name:'cantidad', x:it.x});
    else if(t.startsWith('precio')) colDefsRaw.push({name:'precio', x:it.x});
    else if(t==='impuestos') colDefsRaw.push({name:'impuestos', x:it.x});
    else if(t==='importe') colDefsRaw.push({name:'importe', x:it.x});
  });
  if(headerY===null || colDefsRaw.length<3) return []; // formato no reconocido: usar respaldo genérico

  const seen = {};
  const cols = [];
  colDefsRaw.forEach(c=>{ if(!seen[c.name]){ seen[c.name]=true; cols.push(c); } });
  cols.sort((a,b)=>a.x-b.x);

  function colFor(x){
    let chosen = cols[0].name;
    for(let i=0;i<cols.length;i++){ if(x >= cols[i].x - 5) chosen = cols[i].name; }
    return chosen;
  }

  const body = items.filter(it=> it.y < headerY - 2);
  const rows = {};
  body.forEach(it=>{
    let key = Object.keys(rows).map(Number).find(k=>Math.abs(k-it.y)<=3);
    if(key===undefined) key = it.y;
    (rows[key]=rows[key]||[]).push(it);
  });
  const ys = Object.keys(rows).map(Number).sort((a,b)=>b-a);

  const productos = [];
  let current = null;
  let stop = false;

  ys.forEach(y=>{
    if(stop) return;
    const rowItems = rows[y].sort((a,b)=>a.x-b.x);
    const bucket = {};
    rowItems.forEach(it=>{
      const c = colFor(it.x);
      bucket[c] = (bucket[c] ? bucket[c]+' ' : '') + it.str;
    });
    const descTxt = (bucket.descripcion||'').trim();
    const lowDesc = descTxt.toLowerCase();
    if(lowDesc==='subtotal' || lowDesc.startsWith('iva') || lowDesc==='total' || lowDesc.startsWith('impuestos totales')){
      stop = true; return;
    }
    const cantStr = (bucket.cantidad||'').replace(/,/g,'').trim();
    const cantMatch = cantStr.match(/^(\d+(\.\d+)?)/);
    if(cantMatch){
      if(current) productos.push(current);
      const skuMatch = descTxt.match(/\[([^\]]+)\]/);
      current = {
        sku: skuMatch ? skuMatch[1] : '',
        nombre: descTxt.replace(/\[[^\]]+\]\s*/, '').trim(),
        cantidad_solicitada: parseFloat(cantMatch[1])
      };
    } else if(current && descTxt){
      current.nombre = (current.nombre + ' ' + descTxt).trim();
    }
  });
  if(current) productos.push(current);
  return productos.filter(p=>p.nombre && p.cantidad_solicitada>0);
}

function parseLinesToProducts(lines){
  const out = [];
  lines.forEach(line=>{
    let parts = line.split('\t').map(s=>s.trim()).filter(Boolean);
    if(parts.length<2){
      // fallback: split on 2+ spaces
      parts = line.split(/\s{2,}/).map(s=>s.trim()).filter(Boolean);
    }
    if(parts.length>=2){
      const last = parts[parts.length-1].replace(',', '.');
      if(/^\d+(\.\d+)?$/.test(last) && parseFloat(last)>0 && parseFloat(last)<100000){
        const cantidad = parseFloat(last);
        if(parts.length>=3){
          out.push({sku:parts[0], nombre:parts.slice(1,-1).join(' '), cantidad_solicitada:cantidad});
        } else {
          out.push({sku:'', nombre:parts[0], cantidad_solicitada:cantidad});
        }
      }
    }
  });
  return out;
}

async function crearPedidoDesdeModal(){
  const folio = document.getElementById('mFolio').value.trim() || nextFolio();

  const clienteSel = document.getElementById('mCliente').value;
  let cliente = clienteSel;
  if(clienteSel==='__new__'){
    cliente = document.getElementById('mClienteNuevo').value.trim();
    if(!cliente){ showToast('Escribe el nombre del nuevo cliente.'); return; }
    if(!clientes.some(c=>c.toLowerCase()===cliente.toLowerCase())){ clientes.push(cliente); await saveClientes(); }
  }
  if(!cliente){ showToast('Selecciona o agrega el cliente.'); return; }

  const asesorSel = document.getElementById('mAsesor').value;
  let asesor = asesorSel;
  if(asesorSel==='__new__'){
    asesor = document.getElementById('mAsesorNuevo').value.trim();
    if(!asesor){ showToast('Escribe el nombre del nuevo asesor.'); return; }
    if(!asesores.includes(asesor)){ asesores.push(asesor); await saveAsesores(); }
  }
  if(!asesor){ showToast('Selecciona o agrega el asesor.'); return; }

  const tipoPedido = document.getElementById('mTipoPedido').value;
  if(!tipoPedido){ showToast('Selecciona el tipo de pedido (foráneo, local, dropship o mostrador).'); return; }

  const productosValidos = modalProductos.filter(p=>p.nombre && p.cantidad_solicitada>0);
  if(productosValidos.length===0){ showToast('Agrega al menos un producto con nombre y cantidad.'); return; }
  const p = {
    id: uid(),
    folio,
    cliente,
    asesor,
    tipo_pedido: tipoPedido,
    terminos_pago: document.getElementById('mTerminosPago').value || 'Contado',
    fecha_creacion: new Date().toISOString(),
    estado: 'nuevo',
    productos: productosValidos.map(pr=>({sku:pr.sku||'—', nombre:pr.nombre, cantidad_solicitada:pr.cantidad_solicitada, cantidad_surtida:0, surtido:false})),
    envio: {paqueteria:'', guia:'', costo_envio:0, notas:'', fecha_envio:''},
    factura: null,
    locked_by:null, locked_by_session:null, locked_at:null,
    historial: []
  };
  addHistorial(p, 'Cotización cargada', 'Pedido creado por '+asesor+' con '+p.productos.length+' producto(s). Tipo: '+tipoPedido+'.');
  pedidos.push(p);
  await savePedidos();
  closeModal();
  showToast((tipoPedido==='Mostrador'?'⚡ ':'')+'Pedido '+folio+' creado. Ya está visible para Almacén.');
  render();
}

// ---------- LISTA (almacen / embarques / facturacion) ----------
function listaFiltro(tab, p){
  if(tab==='almacen') return p.estado==='nuevo' || p.estado==='surtiendo';
  if(tab==='embarques') return ['surtido','empacando','empacado'].includes(p.estado) && p.tipo_pedido!=='Mostrador';
  if(tab==='facturacion') return p.estado==='enviado' || p.estado==='mostrador';
  return true;
}
function listaCompletados(tab, p){
  if(tab==='almacen') return p.estado!=='nuevo' && p.estado!=='surtiendo';
  if(tab==='embarques') return p.estado==='enviado';
  if(tab==='facturacion') return p.estado==='facturado';
  return false;
}

function renderLista(tab){
  const titulos = {
    almacen: ['Almacén','Surte los productos de cada pedido y confirma cuando termines.'],
    embarques: ['Embarques','Empaca y registra el envío de los pedidos ya surtidos.'],
    facturacion: ['Facturación','Agrega el número de factura y el costo de envío para cerrar el pedido.'],
  };
  const titulo = titulos[tab] || ['',''];
  const pendientes = pedidos.filter(p=>listaFiltro(tab,p)).sort(ordenPrioridad);
  const completados = pedidos.filter(p=>listaCompletados(tab,p)).sort((a,b)=>b.fecha_creacion.localeCompare(a.fecha_creacion)).slice(0,15);
  return `
    <div class="page-title"><div><h1>${titulo[0]}</h1><p>${titulo[1]}</p></div></div>
    <div class="card" style="margin-bottom:20px;">
      ${pendientes.length===0 ? emptyState('📦','Nada pendiente por aquí', tab==='almacen' ? 'Cuando Captura cree un pedido, aparecerá en esta lista.' : 'Cuando Almacén confirme un surtido, el pedido aparecerá aquí automáticamente.') : `
      <table>
        <thead><tr><th>Folio</th><th>Cliente</th><th># Prod.</th><th>Estado</th><th>Recibido</th></tr></thead>
        <tbody>
          ${pendientes.map(p=>{
            const alerta = alertaTexto(p);
            return `
            <tr class="row-clickable" data-id="${p.id}">
              <td class="mono">${p.folio}</td>
              <td>${escapeHtml(p.cliente)}</td>
              <td class="mono">${p.productos.length}</td>
              <td>${badgeHtml(p.estado)} ${mostradorBadge(p)} ${lockIsFresh(p) ? '<span style="font-size:11px;color:var(--ink-faint);">🔒 '+escapeHtml(p.locked_by||'')+'</span>' : ''}</td>
              <td class="mono">${fmtFecha(p.fecha_creacion)}</td>
            </tr>
            ${alerta ? `<tr class="row-clickable" data-id="${p.id}"><td colspan="5" style="padding-top:0;"><div class="pr-alerta" style="margin:0;">⚠ ${escapeHtml(alerta)}</div></td></tr>` : ''}`;
          }).join('')}
        </tbody>
      </table>`}
    </div>
    ${completados.length ? `
    <div class="section-label">Completados recientemente</div>
    <div class="card">
      <table>
        <thead><tr><th>Folio</th><th>Cliente</th><th>Estado</th></tr></thead>
        <tbody>
          ${completados.map(p=>`
            <tr class="row-clickable" data-id="${p.id}">
              <td class="mono">${p.folio}</td><td>${escapeHtml(p.cliente)}</td><td>${badgeHtml(p.estado)} ${mostradorBadge(p)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
    ${footNote()}
  `;
}

function attachListaHandlers(tab){
  document.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.onclick = ()=>{ openPedidoDetail(tr.dataset.id); };
  });
  const btnReset = document.getElementById('btnReset');
  if(btnReset) btnReset.onclick = async ()=>{
    if(confirm('Esto borrará TODOS los pedidos de prueba para todos los que usan este prototipo. ¿Continuar?')){
      pedidos = []; await savePedidos(); render();
    }
  };
}

// ---------- DETALLE DE PEDIDO ----------
function renderStepper(p){
  const pasos = p.tipo_pedido==='Mostrador' ? ESTADOS_MOSTRADOR : ESTADOS_NORMAL;
  const idx = pasos.indexOf(p.estado);
  return '<div class="stepper">' + pasos.map((e,i)=>{
    const cls = i<idx ? 'done' : (i===idx ? 'active':'');
    return `<div class="step ${cls}"><div class="line"></div><div class="dot">${i<idx?'✓':(i+1)}</div><div class="lbl">${ESTADO_LABEL[e]}</div></div>`;
  }).join('') + '</div>';
}

function renderTiempos(p){
  const t = getStageTimes(p);
  const chips = [];
  chips.push({lbl:'Recibido', val: fmtHora(t.creado)});
  if(t.surtido_fin){
    const min = diffMin(t.surtido_inicio, t.surtido_fin);
    chips.push({lbl:'Surtido', val: fmtHora(t.surtido_inicio)+' → '+fmtHora(t.surtido_fin)+(min!==''?' ('+min+' min)':'')});
  } else if(t.surtido_inicio){
    chips.push({lbl:'Surtiendo desde', val: fmtHora(t.surtido_inicio)});
  }
  if(t.empaque_fin){
    const min = diffMin(t.empaque_inicio, t.empaque_fin);
    chips.push({lbl:'Empaque', val: fmtHora(t.empaque_inicio)+' → '+fmtHora(t.empaque_fin)+(min!==''?' ('+min+' min)':'')});
  } else if(t.empaque_inicio){
    chips.push({lbl:'Empacando desde', val: fmtHora(t.empaque_inicio)});
  }
  if(p.tipo_pedido==='Mostrador'){
    if(t.enviado) chips.push({lbl:'Listo mostrador', val: fmtHora(t.enviado)});
  } else if(t.enviado){
    const min = diffMin(t.creado, t.enviado);
    chips.push({lbl:'Enviado', val: fmtHora(t.enviado)+(min!==''?' · total '+min+' min':'')});
  }
  if(t.facturado) chips.push({lbl:'Facturado', val: fmtHora(t.facturado)});
  return `<div class="tiempos-strip">${chips.map(c=>`<div class="tiempo-chip"><span class="tc-lbl">${c.lbl}</span><span class="tc-val mono">${c.val}</span></div>`).join('')}</div>`;
}

function renderResponsables(p){
  const chips = [];
  if(p.responsable_almacen) chips.push({lbl:'Responsable Almacén', val:p.responsable_almacen});
  if(p.responsable_empaque) chips.push({lbl:'Responsable Empaque', val:p.responsable_empaque});
  if(p.responsable_embarques) chips.push({lbl:'Responsable Embarques', val:p.responsable_embarques});
  if(chips.length===0) return '';
  return `<div class="tiempos-strip">${chips.map(c=>`<div class="tiempo-chip"><span class="tc-lbl">${c.lbl}</span><span class="tc-val">${escapeHtml(c.val)}</span></div>`).join('')}</div>`;
}

function renderDetail(p){
  const backTab = currentTab;
  let actionPanel = '';
  const lockedByOther = isLockedByOther(p);

  if(lockedByOther){
    actionPanel = renderSoloLectura(p);
  } else if(backTab==='almacen' && (p.estado==='nuevo'||p.estado==='surtiendo')){
    actionPanel = renderSurtidoPanel(p);
  } else if(backTab==='embarques'){
    actionPanel = renderEmbarquesPanel(p);
  } else if(backTab==='facturacion'){
    actionPanel = renderFacturacionPanel(p);
  } else {
    actionPanel = renderSoloLectura(p);
  }

  const lockBanner = lockedByOther ? `
    <div style="margin:16px 22px 0;background:#FDF2E0;border:1px solid #F0CE8A;color:#7A5510;border-radius:6px;padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:8px;">
      🔒 <strong>${escapeHtml(p.locked_by||'Alguien')}</strong>&nbsp;está viendo/editando este pedido ${lockElapsedTxt(p)}. Se muestra en solo lectura para evitar que se pisen los cambios.
    </div>` : '';

  return `
    <button class="btn btn-ghost btn-sm" id="btnBack" style="margin-bottom:16px;">&larr; Volver</button>
    <div class="card">
      <div class="detail-header">
        <div>
          <h2>${p.folio} &middot; ${escapeHtml(p.cliente)}</h2>
          <div class="meta">Creado ${fmtFecha(p.fecha_creacion)} &middot; Asesor: ${escapeHtml(p.asesor||'—')} &middot; Tipo: ${escapeHtml(p.tipo_pedido||'—')} &middot; Pago: ${escapeHtml(p.terminos_pago||'Contado')}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">${mostradorBadge(p)} ${badgeHtml(p.estado)}</div>
      </div>
      ${lockBanner}
      ${renderStepper(p)}
      ${renderTiempos(p)}
      ${renderResponsables(p)}
      <div class="two-col">
        <div>
          ${actionPanel}
        </div>
        <div>
          <div class="section-label">Bitácora</div>
          <div class="timeline">
            ${p.historial.slice().reverse().map(h=>`
              <div class="tl-item">
                <div class="tl-when">${fmtFecha(h.fecha)}</div>
                <div class="tl-evt">${escapeHtml(h.evento)}</div>
                <div class="tl-user">${escapeHtml(h.usuario)}${h.detalle?' — '+escapeHtml(h.detalle):''}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSurtidoPanel(p){
  const allChecked = p.productos.every(pr=>pr.surtido);
  return `
    <div class="section-label">Surtido de productos</div>
    <table class="prod-table">
      <thead><tr><th></th><th>SKU</th><th>Descripción</th><th>Solicitado</th><th>Surtido</th></tr></thead>
      <tbody>
        ${p.productos.map((pr,i)=>{
          const cant = (pr.cantidad_surtida!==undefined && pr.cantidad_surtida!==null && pr.cantidad_surtida!=='') ? pr.cantidad_surtida : pr.cantidad_solicitada;
          const difiere = pr.surtido && parseFloat(cant) !== parseFloat(pr.cantidad_solicitada);
          return `
          <tr>
            <td><input type="checkbox" class="chk" data-i="${i}" ${pr.surtido?'checked':''}></td>
            <td class="mono">${escapeHtml(pr.sku)}</td>
            <td>${escapeHtml(pr.nombre)}</td>
            <td class="mono">${pr.cantidad_solicitada}</td>
            <td>
              <input type="number" min="0" class="mono" style="width:75px;padding:6px 8px;border:1px solid ${difiere?'var(--red)':'var(--line)'};border-radius:5px;" data-qi="${i}" value="${cant}">
              ${difiere?'<div style="font-size:10.5px;color:var(--red);margin-top:2px;">⚠ diferencia de cantidad</div>':''}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="panel-actions" style="border:none;padding-left:0;padding-right:0;">
      <button class="btn btn-ghost" id="btnGuardarAvance">Guardar avance</button>
      <button class="btn btn-amber" id="btnConfirmarSurtido" ${allChecked?'':'disabled'}>Confirmar surtido</button>
    </div>
    ${allChecked?'':'<p style="font-size:12px;color:var(--ink-soft);">Marca todos los productos como surtidos para poder confirmar.</p>'}
  `;
}

function renderEmbarquesPanel(p){
  if(p.estado==='surtido'){
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
        <div class="section-label" style="margin:0;">Resumen del surtido</div>
        <button class="btn btn-amber" id="btnIniciarEmpaque">Iniciar empaque</button>
      </div>
      ${prodResumenTabla(p)}`;
  }
  if(p.estado==='empacando'){
    const allVerificado = p.productos.every(pr=>pr.verificado_empaque);
    const conDiferencia = p.productos.filter(pr=>{
      const cant = (pr.cantidad_empacada!==undefined && pr.cantidad_empacada!==null) ? pr.cantidad_empacada : pr.cantidad_surtida;
      return parseFloat(cant) !== parseFloat(pr.cantidad_surtida);
    });
    const requiereGuia = p.tipo_pedido !== 'Local';
    const puedeConfirmar = allVerificado && conDiferencia.length===0 && (!requiereGuia || !!(p.envio.guia && p.envio.guia.trim()));
    return `
      <div class="section-label">Verificación de mercancía antes de empacar</div>
      <p style="font-size:12.5px;color:var(--ink-soft);margin-top:-6px;">Revisa cada producto contra lo surtido y confirma la cantidad que realmente vas a meter a la caja.</p>
      <table class="prod-table">
        <thead><tr><th></th><th>SKU</th><th>Descripción</th><th>Surtido</th><th>A empacar</th></tr></thead>
        <tbody>
          ${p.productos.map((pr,i)=>{
            const cant = (pr.cantidad_empacada!==undefined && pr.cantidad_empacada!==null) ? pr.cantidad_empacada : pr.cantidad_surtida;
            const difiere = parseFloat(cant) !== parseFloat(pr.cantidad_surtida);
            return `
            <tr>
              <td><input type="checkbox" class="chk-emp" data-i="${i}" ${pr.verificado_empaque?'checked':''}></td>
              <td class="mono">${escapeHtml(pr.sku)}</td>
              <td>${escapeHtml(pr.nombre)}</td>
              <td class="mono">${pr.cantidad_surtida}</td>
              <td>
                <input type="number" min="0" class="mono" style="width:75px;padding:6px 8px;border:1px solid ${difiere?'var(--red)':'var(--line)'};border-radius:5px;" data-qei="${i}" value="${cant}">
                ${difiere?'<div style="font-size:10.5px;color:var(--red);margin-top:2px;">⚠ distinto a lo surtido</div>':''}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div class="row2" style="margin-top:14px;">
        <div class="field"><label>Número de bultos / cajas</label><input type="number" min="1" id="numBultos" value="${p.num_bultos||1}"></div>
        <div class="field"><label>Número de guía${requiereGuia ? ' (obligatorio para continuar)' : ' (opcional — es entrega local)'}</label><input type="text" id="guiaEmpaque" class="mono" placeholder="${requiereGuia?'Escríbela aquí':'No aplica para entrega local, déjalo en blanco si no tiene'}" value="${escapeHtml(p.envio.guia||'')}"></div>
      </div>
      ${conDiferencia.length ? `
        <div style="margin-top:12px;background:#FBE4E0;border:1px solid var(--red);border-radius:6px;padding:12px 14px;">
          <p style="font-size:13px;color:#8C2E1E;font-weight:600;margin:0 0 8px;">⚠ Hay diferencia de cantidad en ${conDiferencia.length} producto(s) — no se puede continuar a Facturación con faltantes. El pedido debe regresar a Almacén para completarlo.</p>
          <button class="btn btn-danger" id="btnRegresarAlmacen">↩ Regresar a Almacén</button>
        </div>
      ` : ''}
      <div class="panel-actions" style="border:none;padding-left:0;padding-right:0;">
        <button class="btn btn-ghost" id="btnGuardarEmpaque">Guardar avance</button>
        <button class="btn btn-amber" id="btnConfirmarEmpaque" ${puedeConfirmar?'':'disabled'}>Confirmar empaque</button>
      </div>
      ${puedeConfirmar?'':(conDiferencia.length?'':'<p style="font-size:12px;color:var(--ink-soft);">Marca cada producto como verificado'+(requiereGuia?' y escribe el número de guía':'')+' para poder confirmar el empaque.</p>')}
    `;
  }
  if(p.estado==='empacado'){
    return `
      <div class="section-label">Datos de envío</div>
      <p style="font-size:12.5px;color:var(--ink-soft);margin-top:-6px;">La guía ya se capturó durante el empaque; solo confirma la paquetería y el costo.</p>
      <div class="field"><label>Paquetería</label>
        <select id="paqueteria">
          <option value="">Selecciona&hellip;</option>
          <option>Estafeta</option><option>DHL</option><option>FedEx</option><option>Paquetexpress</option>
          <option>Entrega propia</option><option>Otro</option>
        </select>
      </div>
      <div class="field"><label>Número de guía</label><input type="text" id="guia" class="mono" value="${escapeHtml(p.envio.guia||'')}"></div>
      <div class="field"><label>Costo de envío (aproximado, Facturación puede ajustarlo)</label><input type="number" min="0" step="0.01" id="costoEnvio" value="${p.envio.costo_envio||0}"></div>
      <div class="field"><label>Notas (opcional)</label><textarea id="notasEnvio" rows="2"></textarea></div>
      <div class="panel-actions" style="border:none;padding-left:0;padding-right:0;">
        <button class="btn btn-amber" id="btnRegistrarEnvio">Registrar envío</button>
      </div>`;
  }
  return renderSoloLectura(p);
}

function renderFacturacionPanel(p){
  if(p.estado!=='enviado' && p.estado!=='mostrador'){
    return renderSoloLectura(p);
  }
  const esMostrador = p.tipo_pedido==='Mostrador';
  return `
    ${renderAvisoFaltantes(p)}
    <div class="section-label">Resumen del pedido</div>
    ${prodResumenTabla(p)}
    ${esMostrador ? `
      <div style="margin-top:14px;background:#FBE4E0;border:1px solid var(--red);border-radius:6px;padding:10px 14px;font-size:13px;color:#8C2E1E;">
        ⚡ Pedido de <strong>mostrador</strong>: el cliente lo recoge en sucursal, no se embarca.
      </div>` : `
      <div class="section-label" style="margin-top:16px;">Datos de envío</div>
      <p style="font-size:13.5px;margin-bottom:8px;"><strong>Paquetería:</strong> ${escapeHtml(p.envio.paqueteria||'—')}</p>
      <div class="field"><label>Número de guía</label><input type="text" id="guiaFact" class="mono" placeholder="Escríbela aquí en cuanto la tengas" value="${escapeHtml(p.envio.guia||'')}"></div>`}
    <div class="row2" style="margin-top:14px;">
      <div class="field"><label>Número de factura</label><input type="text" id="numFactura" class="mono" placeholder="Ej. F-00458"></div>
      <div class="field"><label>Costo de envío</label><input type="number" min="0" step="0.01" id="costoEnvioFact" value="${p.envio.costo_envio||0}"></div>
    </div>
    <p style="font-size:12px;color:var(--ink-soft);margin-top:-8px;">El costo de envío puede ser $0 (gratis) o el monto que corresponda.</p>
    <div class="panel-actions" style="border:none;padding-left:0;padding-right:0;">
      <button class="btn btn-amber" id="btnRegistrarFactura">Registrar factura</button>
    </div>
  `;
}

function prodResumenTabla(p){
  const conEmpaque = p.productos.some(pr=>pr.cantidad_empacada!==undefined && pr.cantidad_empacada!==null && ['empacado','enviado'].includes(p.estado));
  return `<table class="prod-table"><thead><tr><th>SKU</th><th>Descripción</th><th>Solicitado</th><th>Surtido</th>${conEmpaque?'<th>Empacado</th>':''}</tr></thead><tbody>
    ${p.productos.map(pr=>`<tr><td class="mono">${escapeHtml(pr.sku)}</td><td>${escapeHtml(pr.nombre)}</td><td class="mono">${pr.cantidad_solicitada}</td><td class="mono">${pr.cantidad_surtida}</td>${conEmpaque?'<td class="mono">'+(pr.cantidad_empacada!==undefined?pr.cantidad_empacada:'—')+'</td>':''}</tr>`).join('')}
  </tbody></table>`;
}

function renderSoloLectura(p){
  let extra = '';
  if(p.estado==='enviado' || p.estado==='empacado'){
    extra += `<div class="section-label" style="margin-top:16px;">Envío</div>
      <p style="font-size:13.5px;"><strong>Paquetería:</strong> ${escapeHtml(p.envio.paqueteria||'—')}<br>
      <strong>Guía:</strong> <span class="mono">${escapeHtml(p.envio.guia||'—')}</span><br>
      ${p.envio.notas?'<strong>Notas:</strong> '+escapeHtml(p.envio.notas)+'<br>':''}</p>`;
  }
  if(p.estado==='facturado' && p.factura){
    extra += `<div class="section-label" style="margin-top:16px;">Facturación</div>
      <p style="font-size:13.5px;"><strong>N° de factura:</strong> <span class="mono">${escapeHtml(p.factura.numero)}</span><br>
      <strong>Costo de envío:</strong> $${Number(p.factura.costo_envio||0).toFixed(2)}${p.tipo_pedido==='Mostrador'?' (mostrador — sin embarque)':''}</p>`;
  }
  return `${renderAvisoFaltantes(p)}<div class="section-label">Productos</div>${prodResumenTabla(p)}${extra}`;
}

function clearLockFields(p){
  p.locked_by = null; p.locked_by_session = null; p.locked_at = null;
  clearInterval(lockHeartbeatTimer);
}

function attachDetailHandlers(p){
  document.getElementById('btnBack').onclick = async ()=>{ await releaseLock(p); currentPedidoId=null; render(); };

  const btnGuardar = document.getElementById('btnGuardarAvance');
  if(btnGuardar) btnGuardar.onclick = async ()=>{
    syncSurtidoInputs(p);
    if(p.estado==='nuevo'){ p.estado='surtiendo'; addHistorial(p,'Surtido iniciado'); }
    await savePedidos(); showToast('Avance guardado.'); render();
  };
  const btnConfirmar = document.getElementById('btnConfirmarSurtido');
  if(btnConfirmar) btnConfirmar.onclick = async ()=>{
    syncSurtidoInputs(p);
    if(!p.productos.every(pr=>pr.surtido)){ showToast('Faltan productos por marcar.'); return; }
    p.estado='surtido';
    p.responsable_almacen = userName || 'Sin nombre';
    clearLockFields(p);
    if(p.tipo_pedido==='Mostrador'){
      p.estado='mostrador';
      addHistorial(p,'Surtido confirmado','Entrega en mostrador — pasa directo a Facturación, sin embarque.');
      await savePedidos();
      showToast('⚡ Pedido de mostrador listo. Pasa directo a Facturación.');
    } else {
      addHistorial(p,'Surtido confirmado','Notificación enviada a Embarques.');
      await savePedidos();
      showToast('Surtido confirmado. Embarques fue notificado.');
    }
    render();
  };

  const btnIniciarEmpaque = document.getElementById('btnIniciarEmpaque');
  if(btnIniciarEmpaque) btnIniciarEmpaque.onclick = async ()=>{
    p.productos.forEach(pr=>{
      if(!pr.verificado_empaque){
        // solo se inicializa lo que aún no se había verificado (p.ej. tras un regreso
        // a Almacén por faltante); lo ya verificado antes se conserva tal cual.
        pr.cantidad_empacada = pr.cantidad_surtida;
      }
    });
    p.estado='empacando'; addHistorial(p,'Empaque iniciado');
    await savePedidos(); render();
  };
  const btnGuardarEmpaque = document.getElementById('btnGuardarEmpaque');
  if(btnGuardarEmpaque) btnGuardarEmpaque.onclick = async ()=>{
    syncEmpaqueInputs(p);
    const guiaInp = document.getElementById('guiaEmpaque');
    if(guiaInp) p.envio.guia = guiaInp.value.trim();
    p.num_bultos = document.getElementById('numBultos').value || p.num_bultos || 1;
    await savePedidos(); showToast('Avance de verificación guardado.'); render();
  };
  const btnConfirmarEmpaque = document.getElementById('btnConfirmarEmpaque');
  if(btnConfirmarEmpaque) btnConfirmarEmpaque.onclick = async ()=>{
    syncEmpaqueInputs(p);
    const guiaInp = document.getElementById('guiaEmpaque');
    const guia = guiaInp ? guiaInp.value.trim() : (p.envio.guia||'');
    const requiereGuia = p.tipo_pedido !== 'Local';
    if(requiereGuia && !guia){ p.envio.guia = ''; showToast('Escribe el número de guía antes de confirmar el empaque.'); render(); return; }
    p.envio.guia = guia;
    if(!p.productos.every(pr=>pr.verificado_empaque)){ showToast('Faltan productos por verificar.'); return; }
    const hayDiferencia = p.productos.some(pr=>parseFloat(pr.cantidad_empacada)!==parseFloat(pr.cantidad_surtida));
    if(hayDiferencia){ showToast('Hay diferencias de cantidad — regresa el pedido a Almacén para completarlo.'); render(); return; }
    const bultos = document.getElementById('numBultos').value || 1;
    p.num_bultos = bultos;
    p.estado='empacado';
    p.responsable_empaque = userName || 'Sin nombre';
    addHistorial(p,'Empaque confirmado', bultos+' bulto(s) · guía '+guia);
    await savePedidos(); render();
  };

  const btnRegresarAlmacen = document.getElementById('btnRegresarAlmacen');
  if(btnRegresarAlmacen) btnRegresarAlmacen.onclick = async ()=>{
    syncEmpaqueInputs(p);
    const afectados = p.productos.filter(pr=>parseFloat(pr.cantidad_empacada)!==parseFloat(pr.cantidad_surtida));
    afectados.forEach(pr=>{
      pr.surtido = false;              // solo el código faltante vuelve a Almacén
      pr.verificado_empaque = false;   // y solo ese código necesitará re-verificarse en Empaque
      pr.cantidad_empacada = undefined;
    });
    p.estado = 'surtiendo';
    const codigos = afectados.map(pr=>pr.sku).join(', ');
    addHistorial(p,'Regresado a Almacén', codigos?'Código(s) con diferencia: '+codigos:'');
    clearLockFields(p);
    await savePedidos();
    showToast('Pedido regresado a Almacén — solo el código faltante necesita completarse.');
    render();
  };

  const btnRegistrarEnvio = document.getElementById('btnRegistrarEnvio');
  if(btnRegistrarEnvio) btnRegistrarEnvio.onclick = async ()=>{
    const paq = document.getElementById('paqueteria').value;
    const guia = document.getElementById('guia').value.trim();
    const costoEnvio = parseFloat(document.getElementById('costoEnvio').value) || 0;
    if(!paq){ showToast('Selecciona la paquetería.'); return; }
    p.envio = {paqueteria:paq, guia, costo_envio:costoEnvio, notas:document.getElementById('notasEnvio').value.trim(), fecha_envio:new Date().toISOString()};
    p.estado='enviado';
    p.responsable_embarques = userName || 'Sin nombre';
    addHistorial(p,'Enviado al cliente', paq+(guia?' · guía '+guia:' · guía pendiente')+' · costo envío $'+costoEnvio.toFixed(2));
    clearLockFields(p);
    await savePedidos();
    showToast('Envío registrado. Pasa a Facturación.');
    render();
  };

  const btnRegistrarFactura = document.getElementById('btnRegistrarFactura');
  if(btnRegistrarFactura) btnRegistrarFactura.onclick = async ()=>{
    const numFactura = document.getElementById('numFactura').value.trim();
    const costoEnvio = parseFloat(document.getElementById('costoEnvioFact').value);
    if(!numFactura){ showToast('Escribe el número de factura.'); return; }
    const guiaInput = document.getElementById('guiaFact');
    if(guiaInput) p.envio.guia = guiaInput.value.trim();
    p.envio.costo_envio = isNaN(costoEnvio) ? (p.envio.costo_envio||0) : costoEnvio;
    p.factura = {numero:numFactura, costo_envio:p.envio.costo_envio, fecha:new Date().toISOString()};
    p.estado='facturado';
    addHistorial(p,'Factura registrada','Factura '+numFactura+(p.envio.guia?' · guía '+p.envio.guia:'')+' · costo envío $'+p.envio.costo_envio.toFixed(2));
    clearLockFields(p);
    await savePedidos();
    showToast('Factura registrada. Pedido cerrado.');
    render();
  };
}

function syncSurtidoInputs(p){
  document.querySelectorAll('.chk').forEach(chk=>{
    p.productos[+chk.dataset.i].surtido = chk.checked;
  });
  document.querySelectorAll('[data-qi]').forEach(inp=>{
    p.productos[+inp.dataset.qi].cantidad_surtida = parseFloat(inp.value)||0;
  });
}

function syncEmpaqueInputs(p){
  document.querySelectorAll('.chk-emp').forEach(chk=>{
    p.productos[+chk.dataset.i].verificado_empaque = chk.checked;
  });
  document.querySelectorAll('[data-qei]').forEach(inp=>{
    p.productos[+inp.dataset.qei].cantidad_empacada = parseFloat(inp.value)||0;
  });
}

// ---------- PANTALLA (tablero en vivo) ----------
function lastEventIso(p){ return p.historial.length ? p.historial[p.historial.length-1].fecha : p.fecha_creacion; }

// Revisa si algún producto del pedido quedó con una cantidad distinta a la solicitada
// (surtido) o a la surtida (empaque), para poder resaltarlo en la Pantalla y en las listas.
function getDiscrepancias(p){
  const out = [];
  p.productos.forEach(pr=>{
    if(pr.surtido && pr.cantidad_surtida!==undefined && parseFloat(pr.cantidad_surtida)!==parseFloat(pr.cantidad_solicitada)){
      out.push({sku:pr.sku, nombre:pr.nombre, etapa:'Surtido', esperado:pr.cantidad_solicitada, real:pr.cantidad_surtida});
    }
    if(pr.verificado_empaque && pr.cantidad_empacada!==undefined && parseFloat(pr.cantidad_empacada)!==parseFloat(pr.cantidad_surtida)){
      out.push({sku:pr.sku, nombre:pr.nombre, etapa:'Empaque', esperado:pr.cantidad_surtida, real:pr.cantidad_empacada});
    }
  });
  return out;
}

function lastEventTime(p){ return new Date(lastEventIso(p)).getTime(); }
function isRecentlyUpdated(p){ return (Date.now() - lastEventTime(p)) < 20000; }
function elapsedTxt(iso){
  const diffMin = Math.floor((Date.now() - new Date(iso).getTime())/60000);
  if(diffMin<1) return 'justo ahora';
  if(diffMin<60) return 'hace '+diffMin+' min';
  const h = Math.floor(diffMin/60);
  if(h<24) return 'hace '+h+' h';
  return 'hace '+Math.floor(h/24)+' d';
}

// Texto de alerta a mostrar en la Pantalla: motivo de un regreso a Almacén por
// falta de mercancía, o diferencias de cantidad detectadas en surtido/empaque.
function alertaTexto(p){
  if(p.estado==='surtiendo'){
    const last = p.historial[p.historial.length-1];
    if(last && last.evento==='Regresado a Almacén'){
      return 'Por falta de mercancía por surtir — '+(last.detalle||'sin motivo especificado');
    }
  }
  const disc = getDiscrepancias(p);
  if(disc.length){
    return disc.map(d=>'Diferencia de cantidad ('+d.etapa+') código '+(d.sku||'s/código')+': pidió '+d.esperado+', hubo '+d.real).join(' · ');
  }
  return null;
}
function estadoColor(estado){
  const map = {nuevo:'var(--st-nuevo)', surtiendo:'var(--st-surtiendo)', surtido:'var(--st-surtido)', empacando:'var(--st-empacando)', empacado:'var(--st-empacado)', enviado:'var(--st-enviado)', mostrador:'var(--red)', facturado:'#3B4FBF'};
  return map[estado] || 'var(--ink-faint)';
}
function ordenPantallaFila(a,b){
  const score = p=> (alertaTexto(p)?100:0) + prioridadScore(p)*10;
  const sa=score(a), sb=score(b);
  if(sb!==sa) return sb-sa;
  return lastEventTime(b)-lastEventTime(a);
}

function renderPantalla(){
  const activos = pedidos.filter(p=>p.estado!=='facturado').sort(ordenPantallaFila);
  const resumen = ESTADOS_BOARD.map(e=>({estado:e, n:pedidos.filter(p=>p.estado===e).length}));
  return `
    <div class="page-title">
      <div><h1>Pantalla en vivo</h1><p>Ideal para dejar puesta en un monitor del almacén — se actualiza sola, sin necesidad de tocarla.</p></div>
      <button class="btn btn-ghost" id="btnFullscreen">⛶ Pantalla completa</button>
    </div>
    <div class="resumen-chips">
      ${resumen.map(r=>`<div class="resumen-chip"><span class="rc-n">${r.n}</span><span class="rc-lbl">${ESTADO_LABEL[r.estado]}</span></div>`).join('')}
    </div>
    <div class="pantalla-list">
      ${activos.length===0 ? emptyState('📋','Sin pedidos activos','Cuando se cargue una cotización, aparecerá aquí.') : activos.map(p=>{
        const alerta = alertaTexto(p);
        const cls = ['pantalla-row'];
        if(alerta) cls.push('alerta'); else if(p.tipo_pedido==='Mostrador') cls.push('mostrador-row'); else if(p.tipo_pedido==='Local') cls.push('local-row'); else if(isRecentlyUpdated(p)) cls.push('flash-new');
        return `
        <div class="${cls.join(' ')}" data-id="${p.id}" style="border-left-color:${estadoColor(p.estado)};">
          <div class="pr-main">
            <div class="pr-folio">${p.folio}</div>
            <div class="pr-cliente">${escapeHtml(p.cliente)}</div>
            ${mostradorBadge(p)}
            <span class="badge b-${p.estado}">${ESTADO_BADGE_TXT[p.estado]}</span>
          </div>
          ${alerta ? `<div class="pr-alerta">⚠ ${escapeHtml(alerta)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  `;
}
function attachPantallaHandlers(){
  const fs = document.getElementById('btnFullscreen');
  if(fs) fs.onclick = ()=>{ (document.documentElement.requestFullscreen && document.documentElement.requestFullscreen()); };
  document.querySelectorAll('.pantalla-row').forEach(c=>{
    c.onclick = ()=>{ currentPedidoId = c.dataset.id; render(); };
  });
}

// ---------- SONIDO ----------
let soundEnabled = true;
let audioCtx = null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function beep(freq, dur){
  if(!soundEnabled) return;
  const ctx = ensureAudio(); if(!ctx) return;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.type='sine'; osc.frequency.value=freq;
  osc.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.16, ctx.currentTime);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur/1000);
  osc.stop(ctx.currentTime + dur/1000 + 0.03);
}
function beepNuevoPedido(){ beep(880,130); setTimeout(()=>beep(1100,150),150); }
function beepListoEmbarques(){ beep(660,180); }
function beepMostrador(){ beep(950,110); setTimeout(()=>beep(950,110),160); setTimeout(()=>beep(950,160),320); }

// ---------- SONDEO AUTOMÁTICO (auto-actualización) ----------
async function pollPedidos(){
  if(document.getElementById('modalBg') || currentPedidoId) return; // no interrumpir mientras alguien captura o edita
  let remote;
  try{
    const res = await window.storage.get('pedidos', true);
    remote = res ? JSON.parse(res.value) : [];
  }catch(e){ return; }
  const oldMap = {}; pedidos.forEach(p=>oldMap[p.id]=p.estado);
  let hayNuevo=false, hayNuevoMostrador=false, hayListo=false, hayParaFacturar=false, huboCambio = remote.length!==pedidos.length;
  remote.forEach(p=>{
    if(!(p.id in oldMap)){
      huboCambio=true;
      if(p.estado==='nuevo'){ if(p.tipo_pedido==='Mostrador') hayNuevoMostrador=true; else hayNuevo=true; }
    }
    else if(oldMap[p.id]!==p.estado){
      huboCambio=true;
      if(p.estado==='surtido') hayListo=true;
      if(p.estado==='enviado' || p.estado==='mostrador') hayParaFacturar=true;
    }
  });
  if(huboCambio){
    pedidos = remote;
    if(hayNuevoMostrador){ showToast('⚡ Pedido de MOSTRADOR recibido — prioridad inmediata.'); beepMostrador(); }
    if(hayNuevo){ showToast('📥 Nuevo pedido recibido de Asesores.'); beepNuevoPedido(); }
    if(hayListo){ showToast('📦 Un pedido está listo para Embarques.'); beepListoEmbarques(); }
    if(hayParaFacturar){ showToast('🧾 Un pedido está listo para Facturación.'); beepListoEmbarques(); }
    render();
  } else if(currentTab==='pantalla'){
    render(); // refresca tiempos/resalte aunque no haya cambios de datos
  }
}
function startPolling(){ setInterval(pollPedidos, 5000); }

// ---------- HISTORIAL TAB ----------
let historialSearch = '';
function renderHistorial(){
  const rows = pedidos
    .filter(p=> !historialSearch || (p.folio+' '+p.cliente).toLowerCase().includes(historialSearch.toLowerCase()))
    .sort((a,b)=>b.fecha_creacion.localeCompare(a.fecha_creacion));
  return `
    <div class="page-title">
      <div><h1>Historial</h1><p>Trazabilidad completa de cada pedido, sin papel.</p></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <input class="search-input" id="histSearch" placeholder="Buscar por folio o cliente&hellip;" value="${escapeHtml(historialSearch)}">
        <button class="btn btn-amber" id="btnExportExcel">⬇ Exportar Excel</button>
      </div>
    </div>
    <div class="card">
      ${rows.length===0 ? emptyState('🗂️','Sin resultados','Prueba con otro folio o nombre de cliente.') : rows.map(p=>`
        <div style="border-bottom:1px solid var(--line);padding:16px 18px;">
          <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" data-toggle="${p.id}">
            <div><strong class="mono">${p.folio}</strong> &nbsp;${escapeHtml(p.cliente)}</div>
            <div style="display:flex;align-items:center;gap:12px;">${badgeHtml(p.estado)}<span style="color:var(--ink-faint);">▾</span></div>
          </div>
          <div id="hist-${p.id}" style="display:none;margin-top:14px;">
            <div class="timeline">
              ${p.historial.map(h=>`
                <div class="tl-item">
                  <div class="tl-when">${fmtFecha(h.fecha)}</div>
                  <div class="tl-evt">${escapeHtml(h.evento)}</div>
                  <div class="tl-user">${escapeHtml(h.usuario)}${h.detalle?' — '+escapeHtml(h.detalle):''}</div>
                </div>`).join('')}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    ${footNote()}
  `;
}
function attachHistorialHandlers(){
  const search = document.getElementById('histSearch');
  if(search){
    search.oninput = ()=>{ historialSearch = search.value; render(); setTimeout(()=>{ const s=document.getElementById('histSearch'); if(s){ s.focus(); s.selectionStart=s.selectionEnd=s.value.length; } },0); };
  }
  const btnExport = document.getElementById('btnExportExcel');
  if(btnExport) btnExport.onclick = exportarExcel;
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick = ()=>{
      const box = document.getElementById('hist-'+el.dataset.toggle);
      box.style.display = box.style.display==='none' ? 'block' : 'none';
    };
  });
  const btnReset = document.getElementById('btnReset');
  if(btnReset) btnReset.onclick = async ()=>{
    if(confirm('Esto borrará TODOS los pedidos de prueba para todos los que usan este prototipo. ¿Continuar?')){
      pedidos = []; await savePedidos(); render();
    }
  };
}

// ---------- init ----------
document.getElementById('userNameInput').oninput = (e)=>{ userName = e.target.value; };
document.getElementById('btnSound').onclick = (e)=>{
  soundEnabled = !soundEnabled;
  e.target.textContent = soundEnabled ? '🔔 Sonido: ON' : '🔕 Sonido: OFF';
  ensureAudio();
  if(soundEnabled) beep(880,100);
};
document.body.addEventListener('click', ()=>{ ensureAudio(); }, {once:true});

(async function init(){
  await setupStorage();
  if(usandoFirebase){
    document.getElementById('localWarning').innerHTML =
      '<div class="local-warning" style="background:#E3F5EC;color:#1E7A46;border-bottom-color:#8FD9B0;">🔥 Conectado a Firebase — todos los que abran este enlace comparten los mismos datos en tiempo real.</div>';
  } else if(usandoAlmacenamientoLocal){
    document.getElementById('localWarning').innerHTML =
      '<div class="local-warning">⚠ Estás usando esta página fuera de Claude: los datos se guardan solo en este navegador/dispositivo, no se comparten con otras personas. Para trabajo en equipo real, usa el enlace de Claude o conecta Firebase.</div>';
  }
  await loadPedidos();
  await loadAsesores();
  await loadClientes();
  render();
  startPolling();
  window.addEventListener('beforeunload', ()=>{
    if(currentPedidoId){
      const p = pedidos.find(x=>x.id===currentPedidoId);
      if(p && iHoldLock(p)){ clearLockFields(p); savePedidos(); }
    }
  });
  window.addEventListener('pagehide', ()=>{
    if(currentPedidoId){
      const p = pedidos.find(x=>x.id===currentPedidoId);
      if(p && iHoldLock(p)){ clearLockFields(p); savePedidos(); }
    }
  });
})();
</script>
